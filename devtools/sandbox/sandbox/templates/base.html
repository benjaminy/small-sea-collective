<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Small Sea Sandbox{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
  font-size: 14px;
  background: #f8f9fa;
  color: #212529;
  line-height: 1.5;
}

header {
  background: #064e3b;
  color: #fff;
  padding: 0.6rem 1.2rem;
  display: flex;
  align-items: baseline;
  gap: 1rem;
}
header .brand { font-weight: bold; font-size: 1rem; letter-spacing: 0.02em; }
header .subtitle { font-size: 0.8rem; opacity: 0.75; }

main { padding: 1.5rem; max-width: 900px; }

h2 { font-size: 1rem; font-weight: bold; margin-bottom: 0.75rem; }
h3 { font-size: 0.9rem; font-weight: bold; margin-bottom: 0.5rem; color: #064e3b; }

.card {
  background: #fff;
  border: 1px solid #dee2e6;
  border-radius: 4px;
  padding: 1rem;
  margin-bottom: 1rem;
}

.card + .card { margin-top: 0; }

label { display: block; font-size: 0.8rem; color: #6c757d; margin-bottom: 0.25rem; }

input[type="text"] {
  width: 100%;
  padding: 0.35rem 0.5rem;
  border: 1px solid #ced4da;
  border-radius: 3px;
  font-family: inherit;
  font-size: 0.9rem;
}

input[type="text"]:focus {
  outline: 2px solid #065f46;
  outline-offset: 1px;
}

.btn {
  display: inline-block;
  padding: 0.3rem 0.7rem;
  border: 1px solid transparent;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  line-height: 1.4;
  text-decoration: none;
}
.btn-primary { background: #064e3b; color: #fff; border-color: #064e3b; }
.btn-primary:hover { background: #065f46; }
.btn-secondary { background: #fff; color: #495057; border-color: #ced4da; }
.btn-secondary:hover { background: #f1f3f5; }
.btn-danger { background: #fff; color: #c0392b; border-color: #c0392b; }
.btn-danger:hover { background: #fdf3f2; }
.btn[disabled] { opacity: 0.45; cursor: default; pointer-events: none; }
.btn-sm { padding: 0.2rem 0.5rem; font-size: 0.8rem; }

.row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
.row + .row { margin-top: 0.5rem; }

table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #dee2e6; vertical-align: middle; }
th { font-size: 0.75rem; text-transform: uppercase; color: #6c757d; }

.badge {
  display: inline-block;
  padding: 0.1rem 0.45rem;
  border-radius: 3px;
  font-size: 0.75rem;
  font-weight: bold;
}
.badge-running { background: #d1fae5; color: #064e3b; }
.badge-stopped { background: #f1f3f5; color: #868e96; }

.error-msg { color: #c0392b; font-size: 0.8rem; margin-top: 0.3rem; }

.htmx-settling .settle-flash { background: #d1fae5 !important; transition: background 0.4s; }

.muted { color: #6c757d; font-size: 0.8rem; }
.mono { font-family: inherit; }
</style>
</head>
<body>
<header>
  <span class="brand">Small Sea Sandbox</span>
  <span class="subtitle">interactive test environment</span>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
