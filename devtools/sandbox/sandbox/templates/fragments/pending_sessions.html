{% if sessions %}
<div style="margin-top:0.5rem; border-top:1px solid #dee2e6; padding-top:0.4rem;">
  <div style="font-size:0.7rem; text-transform:uppercase; color:#6c757d; margin-bottom:0.3rem;">Pending sessions</div>
  {% for s in sessions %}
  <div class="row" style="margin-bottom:0.3rem; flex-wrap:nowrap;">
    <span class="muted" style="flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"
          title="{{ s.app_name }} / {{ s.team_name }}">
      {% if s.mode_warning %}{{ s.mode_warning }} {% endif %}{{ s.client_name }} → {{ s.team_name }}
    </span>
    <code style="font-size:1rem; font-weight:bold; color:#064e3b; letter-spacing:0.15em;">{{ s.pin }}</code>
  </div>
  {% endfor %}
</div>
{% endif %}
