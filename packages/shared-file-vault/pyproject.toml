[project]
name = "shared-file-vault"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "cod-sync",
    "click>=8.0",
    "fastapi[standard]>=0.118.0",
    "jinja2>=3.1",
    "small-sea-client",
]

[project.scripts]
shared-file-vault = "shared_file_vault.cli:cli"

[tool.uv.sources]
cod-sync = { workspace = true }
small-sea-client = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
