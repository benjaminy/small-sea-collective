<div id="team-{{ team.name }}" class="team-section">
  <h2>{{ team.name }}</h2>
  {% if team.niches %}
  <table>
    <thead>
      <tr>
        <th>Niche</th>
        <th>Checkout</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for niche in team.niches %}
      <tr>
        <td>
          <button class="niche-link"
                  hx-get="/teams/{{ team.name }}/niches/{{ niche.name }}"
                  hx-target="#niche-detail"
                  hx-swap="innerHTML"
                  hx-push-url="false">{{ niche.name }}</button>
        </td>
        <td>
          {% if niche.has_checkout %}
            <span class="badge badge-clean">attached</span>
          {% else %}
            <span class="badge badge-none">none</span>
          {% endif %}
        </td>
        <td style="text-align:right; white-space:nowrap">
          <button class="btn btn-secondary"
                  hx-get="/teams/{{ team.name }}/niches/{{ niche.name }}"
                  hx-target="#niche-detail"
                  hx-swap="innerHTML">Detail</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p style="padding:0.75rem 1rem; color:#78716c; font-size:0.88rem">No niches yet.</p>
  {% endif %}

  <div style="padding:0.6rem 1rem; border-top:1px solid #f5f5f4">
    {% if error %}
    <p class="notice notice-err" style="margin-bottom:0.5rem">{{ error }}</p>
    {% endif %}
    <form class="inline-form"
          hx-post="/teams/{{ team.name }}/niches"
          hx-target="#team-{{ team.name }}"
          hx-swap="outerHTML">
      <input type="text" name="niche_name" placeholder="New niche name" required>
      <button class="btn btn-secondary" type="submit">Add niche</button>
    </form>
  </div>
</div>
