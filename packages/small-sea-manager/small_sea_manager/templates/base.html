<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Small Sea Manager{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f5f5f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1c1917;
      color: #e7e5e4;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-shrink: 0;
    }
    header a { color: #e7e5e4; text-decoration: none; font-weight: 600; }
    header .identity { font-size: 0.8rem; color: #a8a29e; margin-left: auto; }

    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 13rem;
      min-width: 13rem;
      background: white;
      border-right: 1px solid #e7e5e4;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #a8a29e;
      padding: 0.6rem 0.75rem 0.25rem;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.75rem;
    }
    .sidebar-item button.team-link {
      flex: 1;
      text-align: left;
      font-size: 0.88rem;
    }

    #hub-connection {
      border-bottom: 1px solid #e7e5e4;
      padding: 0.6rem 0.75rem;
    }
    .hub-connection-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.4rem;
    }
    .hub-connection-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #78716c;
      flex: 1;
    }
    .hub-connection-body { font-size: 0.85rem; }
    .hub-connection-body .inline-form { flex-wrap: nowrap; }

    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid #e7e5e4;
      padding: 0.6rem 0.75rem;
    }
    .sidebar-create-form {
      display: flex;
      gap: 0.35rem;
    }
    .sidebar-create-form input {
      flex: 1;
      min-width: 0;
      padding: 0.25rem 0.5rem;
      border: 1px solid #d6d3d1;
      border-radius: 4px;
      font-size: 0.82rem;
    }
    .sidebar-create-form input:focus { outline: 2px solid #7c3aed; border-color: transparent; }

    /* Session status dot */
    .session-dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-active  { background: #16a34a; }
    .dot-pending { background: #ca8a04; }
    .dot-none    { background: #d6d3d1; }

    /* ── Main content ── */
    #main-content {
      flex: 1;
      padding: 1.25rem 1.5rem;
      overflow-y: auto;
      min-width: 0;
    }

    /* ── Section cards ── */
    .card {
      background: white;
      border: 1px solid #e7e5e4;
      border-radius: 6px;
      margin-bottom: 1.25rem;
    }
    .card-header {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #78716c;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid #e7e5e4;
    }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 0.55rem 1rem; text-align: left; }
    th {
      font-size: 0.78rem; font-weight: 600; color: #a8a29e;
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid #e7e5e4;
    }
    tr + tr td { border-top: 1px solid #f5f5f4; }

    /* ── Detail panel ── */
    #team-detail {
      background: white;
      border: 1px solid #e7e5e4;
      border-radius: 6px;
      margin-bottom: 1.25rem;
    }
    #team-detail:empty { display: none; }

    .detail-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #e7e5e4;
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
    }
    .detail-header h2 { font-size: 1rem; }
    .detail-section {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f5f5f4;
    }
    .detail-section:last-child { border-bottom: none; }
    .detail-section h3 {
      font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; color: #a8a29e; margin-bottom: 0.6rem;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block; font-size: 0.75rem; font-weight: 600;
      padding: 0.1rem 0.45rem; border-radius: 3px;
    }
    .badge-green  { background: #dcfce7; color: #15803d; }
    .badge-amber  { background: #fef9c3; color: #854d0e; }
    .badge-grey   { background: #f5f5f4; color: #78716c; }
    .badge-blue   { background: #e0f2fe; color: #0369a1; }
    .badge-red    { background: #fef2f2; color: #b91c1c; }
    .badge-self   { background: #ede9fe; color: #6d28d9; }

    /* ── Inline forms ── */
    .inline-form {
      display: flex; gap: 0.5rem; align-items: flex-start; flex-wrap: wrap;
    }
    .inline-form input[type="text"],
    .inline-form select {
      flex: 1; min-width: 8rem;
      padding: 0.35rem 0.6rem;
      border: 1px solid #d6d3d1; border-radius: 4px; font-size: 0.88rem;
    }
    .inline-form input[type="text"]:focus,
    .inline-form select:focus { outline: 2px solid #7c3aed; border-color: transparent; }
    textarea {
      width: 100%; resize: vertical; min-height: 4rem;
      font-family: monospace; font-size: 0.83rem;
      padding: 0.35rem 0.6rem;
      border: 1px solid #d6d3d1; border-radius: 4px;
      margin-bottom: 0.5rem;
    }
    textarea:focus { outline: 2px solid #7c3aed; border-color: transparent; }

    /* ── Buttons ── */
    button, .btn {
      padding: 0.35rem 0.75rem; border: 1px solid transparent;
      border-radius: 4px; font-size: 0.85rem; cursor: pointer; white-space: nowrap;
    }
    .btn-sm { padding: 0.2rem 0.55rem; font-size: 0.8rem; }
    .btn-primary { background: #4c1d95; color: white; border-color: #4c1d95; }
    .btn-primary:hover { background: #5b21b6; }
    .btn-secondary { background: white; color: #1a1a1a; border-color: #d6d3d1; }
    .btn-secondary:hover { background: #f5f5f4; }
    .btn-danger { background: white; color: #b91c1c; border-color: #fca5a5; font-size: 0.8rem; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-disabled {
      background: #f5f5f4; color: #a8a29e; border-color: #e7e5e4;
      cursor: not-allowed; font-size: 0.85rem;
    }
    button.team-link {
      background: none; border: none; color: #6d28d9;
      padding: 0; font-size: inherit; text-decoration: underline; cursor: pointer;
    }
    button.team-link:hover { color: #5b21b6; }

    /* ── Token display ── */
    .token-box {
      font-family: monospace; font-size: 0.8rem;
      background: #f5f5f4; border: 1px solid #d6d3d1;
      border-radius: 4px; padding: 0.5rem 0.75rem;
      word-break: break-all; margin: 0.25rem 0 0.75rem;
      user-select: all;
    }
    .token-instruction { font-size: 0.85rem; color: #44403c; margin-bottom: 0.25rem; }

    /* ── Notices ── */
    .notice {
      padding: 0.4rem 0.75rem; border-radius: 4px;
      font-size: 0.85rem; margin-bottom: 0.6rem;
    }
    .notice-ok   { background: #dcfce7; color: #15803d; }
    .notice-err  { background: #fef2f2; color: #b91c1c; }
    .notice-info { background: #e0f2fe; color: #0369a1; }

    /* ── Stub label ── */
    .stub-label { font-size: 0.75rem; color: #a8a29e; font-style: italic; }

    /* ── htmx settling flash (purple for the Manager) ── */
    .htmx-settling { animation: settle-flash 0.6s ease-out; }
    @keyframes settle-flash {
      0%   { background-color: #ede9fe; }
      100% { background-color: transparent; }
    }

    .mono { font-family: monospace; font-size: 0.83rem; color: #44403c; }
    .muted { color: #78716c; }
    .row { display: flex; align-items: center; gap: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <a href="/">Small Sea Manager</a>
    {% block header_extra %}{% endblock %}
    <span class="identity">{% block identity %}{% endblock %}</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
