<div class="detail-header">
  <h2>{{ team_name }}</h2>
  {% with status=sync_status %}
    {% include "fragments/sync_badge.html" %}
  {% endwith %}
  <form hx-post="/teams/{{ team_name }}/push"
        hx-target="#sync-result"
        hx-swap="outerHTML"
        hx-on::after-request="htmx.trigger('#sync-badge-{{ team_name }}', 'refresh')">
    <button class="btn btn-secondary" type="submit">Push to cloud</button>
  </form>
</div>

<div class="detail-section" style="padding-top:0.4rem; padding-bottom:0.4rem;">
  {% include "fragments/team_session.html" %}
</div>

<div class="detail-section" style="padding-top:0.4rem; padding-bottom:0.4rem">
  <div id="sync-result"></div>
</div>

<div class="detail-section">
  <h3>Members</h3>
  {% include "fragments/members.html" %}
</div>

<div class="detail-section">
  <h3>Invitations</h3>
  {% include "fragments/invitations.html" %}
</div>
