<div id="teams-section">
  {% if error %}
  <p class="notice notice-err" style="margin:0.75rem 1rem">{{ error }}</p>
  {% endif %}

  {% if teams %}
  <table>
    <thead>
      <tr>
        <th>Team</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for team in teams %}
      <tr>
        <td>
          <button class="team-link"
                  hx-get="/teams/{{ team.name }}"
                  hx-target="#team-detail"
                  hx-swap="innerHTML">{{ team.name }}</button>
        </td>
        <td style="text-align:right">
          <button class="btn btn-secondary"
                  hx-get="/teams/{{ team.name }}"
                  hx-target="#team-detail"
                  hx-swap="innerHTML">Detail</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p style="padding:0.75rem 1rem; color:#78716c; font-size:0.88rem">No teams yet.</p>
  {% endif %}

  <div style="padding:0.6rem 1rem; border-top:1px solid #f5f5f4">
    <form class="inline-form"
          hx-post="/teams"
          hx-target="#teams-section"
          hx-swap="outerHTML">
      <input type="text" name="team_name" placeholder="New team name" required>
      <button class="btn btn-primary" type="submit">Create team</button>
    </form>
  </div>
</div>
